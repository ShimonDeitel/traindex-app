name: Traindex
options:
  bundleIdPrefix: com.shimondeitel.traintrack
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Traindex:
    type: application
    platform: iOS
    sources:
      - path: Traindex
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.traintrack
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Traindex/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  TraindexTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TraindexTests
      - path: Traindex.storekit
    dependencies:
      - target: Traindex
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.traintrack.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  TraindexUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: TraindexUITests
    dependencies:
      - target: Traindex
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.traintrack.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Traindex:
    build:
      targets:
        Traindex: all
        TraindexTests: [test]
        TraindexUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Traindex.storekit
    test:
      config: Debug
      storeKitConfiguration: Traindex.storekit
      targets:
        - TraindexTests
        - TraindexUITests
    archive:
      config: Release
